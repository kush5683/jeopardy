services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jeopardy
      POSTGRES_USER: jeopardy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Bind to loopback only — the host can reach it for tests/admin queries,
    # but it's not exposed externally.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeopardy -d jeopardy"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://jeopardy:${DB_PASSWORD}@db:5432/jeopardy
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3000
      SEED_DB: ${SEED_DB:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-0}
      WIKIPEDIA_USER_AGENT: ${WIKIPEDIA_USER_AGENT:-}
      # Ollama runs on the host (outside Docker); host.docker.internal resolves
      # to the Mac's loopback on Docker Desktop. Used by the LLM answer judge.
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
      - reverse-proxy
    labels:
      - "traefik.enable=false"

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  reverse-proxy:
    external: true
